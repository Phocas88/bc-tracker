<style>
:root{
  --bg:#0b0d13;--surface:#13161f;--card:#191c28;--border:#252a3a;
  --accent:#f0a500;--green:#1fd480;--red:#ff4d4d;--purple:#a78bfa;
  --bealls:#f472b6;--sjl:#60a5fa;--ka:#34d399;--text:#e6e8f0;--muted:#5a6080;
  --font:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:var(--body)}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin .7s linear infinite}
.pulse{animation:pulse 1.8s infinite}
.pop{animation:pop .18s cubic-bezier(.34,1.56,.64,1) both}
.slide-up{animation:slideUp .2s ease both}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
.main{max-width:1100px;margin:0 auto;padding:20px 16px;width:100%}
.narrow{max-width:700px}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%}

/* Name screen */
#name-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.name-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.name-card h1{font-family:var(--font);font-size:3.2rem;font-weight:900;color:var(--accent);letter-spacing:.04em;line-height:1;margin-bottom:4px}
.name-card p{color:var(--muted);font-size:.85rem;margin-bottom:24px}

/* Header */
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.h-title{font-family:var(--font);font-size:1.4rem;font-weight:900;color:var(--accent);letter-spacing:.05em}
.h-sub{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:2px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block}
.tab-nav{display:flex;gap:8px}

/* Buttons */
.btn{border:none;border-radius:8px;padding:0 22px;height:46px;font-family:var(--font);font-size:1rem;font-weight:800;letter-spacing:.06em;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s;cursor:pointer}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-accent{background:var(--accent);color:#000}
.btn-green{background:var(--green);color:#000}
.btn-purple{background:var(--purple);color:#000}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-sm{height:34px;padding:0 14px;font-size:.82rem}
.btn-tab{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:6px;font-family:var(--font);font-size:.88rem;font-weight:700;letter-spacing:.06em;transition:all .15s;cursor:pointer}
.btn-tab:hover{border-color:var(--accent);color:var(--accent)}
.btn-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* Inputs */
.inp{background:var(--bg);border:2px solid var(--border);border-radius:8px;color:var(--text);outline:none;transition:border-color .15s;padding:12px 14px}
.inp:focus{border-color:var(--accent)}
.inp:disabled{opacity:.45}
.inp-lg{font-size:1.4rem;font-family:var(--font);font-weight:700;letter-spacing:.06em}
.inp-md{font-size:1.1rem;font-family:var(--font);font-weight:700}
.inp-sm{font-size:.88rem;padding:7px 12px}

/* Cards */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:12px}
.p16{padding:16px}
.p20{padding:20px}

/* Sticky scan bar */
.scan-bar{position:sticky;top:62px;z-index:100;background:var(--card);border:1.5px solid var(--border);border-radius:0 0 12px 12px;padding:16px 20px;margin-bottom:16px}

/* Result cards */
.result-order{background:#091f10;border:2px solid var(--green);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.result-715{background:#10102a;border:2px solid var(--purple);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.result-unknown{background:#1f0a0a;border:2px solid var(--red);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.result-dest{font-family:var(--font);font-size:1.8rem;font-weight:800;line-height:1.1;margin-bottom:4px}

/* Pallet lock banner */
.pallet-lock{background:rgba(240,165,0,.1);border:1px solid var(--accent);border-radius:8px;padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:.85rem}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;border:1px solid;white-space:nowrap}
.b-bealls{background:rgba(244,114,182,.12);border-color:var(--bealls);color:var(--bealls)}
.b-sjl{background:rgba(96,165,250,.12);border-color:var(--sjl);color:var(--sjl)}.b-ka{background:rgba(52,211,153,.12);border-color:var(--ka);color:var(--ka)}
.b-green{background:rgba(31,212,128,.12);border-color:var(--green);color:var(--green)}
.b-purple{background:rgba(167,139,250,.12);border-color:var(--purple);color:var(--purple)}
.b-amber{background:rgba(240,165,0,.12);border-color:var(--accent);color:var(--accent)}
.b-red{background:rgba(255,77,77,.12);border-color:var(--red);color:var(--red)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{padding:16px 18px}
.kpi-lbl{font-family:var(--font);font-size:.65rem;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:4px}
.kpi-val{font-family:var(--font);font-size:2rem;font-weight:900;line-height:1}
.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:3px}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1.5px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead tr{background:var(--surface)}
th{padding:10px 14px;text-align:left;font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:1.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--accent)}
td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* Progress bar */
.prog{height:5px;background:var(--border);border-radius:3px;overflow:hidden;width:80px;flex-shrink:0}
.prog-fill{height:100%;border-radius:3px}

/* Feed rows */
.feed-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.feed-row:last-child{border-bottom:none}

/* Pallet card */
.pallet-card{padding:16px 18px;margin-bottom:10px}
.pallet-id{font-family:var(--font);font-size:1.3rem;font-weight:900;color:var(--accent)}
.item-tag{padding:3px 10px;border-radius:6px;font-size:.78rem;font-weight:600;background:var(--surface);border:1px solid var(--border)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:500;z-index:9998;display:none;background:var(--card);border:1.5px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:300px}

/* Misc */
.section-lbl{font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:.9rem}
.flex{display:flex}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.wrap{flex-wrap:wrap}.center{align-items:center}.between{justify-content:space-between}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}
.w100{width:100%}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.hide-sm{display:none!important}}
</style>

// BOOT
// ═══════════════════════════════════════════════════════
function boot() {
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    let firstConnect = true;

    onValue(ref(db, "tracker"), snap => {
      const d = snap.val() || {};
      liveData.picks   = d.picks   || {};
      liveData.pallets = d.pallets || {};
      liveData.log     = d.log
        ? Object.entries(d.log).map(([k,v]) => ({...v, _key:k})).sort((a,b) => b.ts - a.ts)
        : [];

      if (firstConnect) {
        firstConnect = false;
        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "flex";
        const saved = localStorage.getItem("bc_worker_name");
        if (saved) { workerName = saved; renderShell(); renderView(); setupPresence(workerName); }
        else showNameScreen();
      } else {
        syncHeader();
        // Only auto-re-render the pick view - manager tabs are on-demand
        if (document.getElementById("main-content")) {
          if (tab === "pick") renderView();
          else updateManagerKPIs();
        }
      }
    });
  } catch(e) {
    document.getElementById("loading").innerHTML =
      '<div style="color:var(--red);font-family:var(--font);text-align:center;padding:40px">' +
      '<div style="font-size:2rem;margin-bottom:12px">⚠</div>' +
      '<div>Firebase connection failed.<br>Check config.</div></div>';
  }
}

// PRESENCE — live active user tracking
// ══════════════════════════════════════════════════════
let presenceRef = null;

function setupPresence(name) {
  // Generate a unique session ID for this browser tab
  const sessionId = Math.random().toString(36).slice(2, 10);
  const connRef   = ref(db, ".info/connected");
  presenceRef     = ref(db, "tracker/presence/" + sessionId);

  onValue(connRef, snap => {
    if (!snap.val()) return; // offline

    // Write our presence record; auto-delete on disconnect
    onDisconnect(presenceRef).remove();
    update(presenceRef, {
      name:    name,
      tab:     tab || "pick",
      since:   Date.now(),
    });
  });

  // Watch the presence list and update header counter
  onValue(ref(db, "tracker/presence"), snap => {
    const sessions = snap.val() || {};
    const users = Object.values(sessions);
    const count = users.length;
    const names = [...new Set(users.map(u => u.name))].join(", ");

    const el = document.getElementById("hdr-online");
    if (el) {
      el.textContent = "👥 " + count + (count === 1 ? " user" : " users");
      el.title = count + " active: " + (names || "—");
    }
  });
}

function syncHeader() {
  const el = document.getElementById("hdr-sync");
  if (el) el.textContent = "· " + new Date().toLocaleTimeString();
}

function setTab(t) {
  if (t === "manager" && !managerUnlocked) { showPinModal(); return; }
  tab = t;
  document.getElementById("tab-pick")?.classList.toggle("active", t === "pick");
  document.getElementById("tab-mgr")?.classList.toggle("active", t === "manager");
  renderView();
}

function renderView() {
  if (tab === "pick") renderPick();
  else renderManager();
}

function logout() {
  localStorage.removeItem("bc_worker_name");
  workerName = ""; managerUnlocked = false; pendingScan = null; palletLock = null; palletChoice = null;
  document.getElementById("app").innerHTML = "";
  showNameScreen();
}

  document.getElementById("modal-root").appendChild(div);
  const inp = document.getElementById("pin-inp");
  setTimeout(() => inp?.focus(), 80);
  document.getElementById("pin-ok").onclick = checkPin;
  document.getElementById("pin-cancel").onclick = closeModal;
  inp.onkeydown = e => { if (e.key === "Enter") checkPin(); };
  div.onclick = e => { if (e.target === div) closeModal(); };
}

function checkPin() {
  const v = (document.getElementById("pin-inp")?.value || "").trim();
  if (v === MANAGER_PIN) {
    managerUnlocked = true;
    closeModal();
    tab = "manager";
    document.getElementById("tab-pick")?.classList.remove("active");
    document.getElementById("tab-mgr")?.classList.add("active");
    renderManager();
  } else {
    const err = document.getElementById("pin-err");
    if (err) err.textContent = "Incorrect PIN — try again";
    const inp = document.getElementById("pin-inp");
    if (inp) { inp.value = ""; inp.style.borderColor = "var(--red)"; inp.focus(); }
  }
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

  html += '</div>';
  html += '<div style="padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap">';
  html += '<button id="pick-move-btn" class="btn btn-outline" style="flex:1;min-width:140px;color:var(--sjl);border-color:var(--sjl);height:44px;font-size:.85rem">↗ MOVE ITEMS BETWEEN PALLETS</button>';
  html += '<button id="pick-edit-btn" class="btn btn-outline" style="flex:1;min-width:140px;color:var(--accent);border-color:var(--accent);height:44px;font-size:.85rem">✏ EDIT PALLET QTY</button>';
  html += '</div></div>';

  html += '</div>'; // end main

  mc.innerHTML = html;

  // Attach events (no inline onclick)
  const scanBtn = document.getElementById("scan-btn");
  const scanInp = document.getElementById("scan-inp");
  if (scanBtn) scanBtn.onclick = doScan;
  if (scanInp) scanInp.onkeydown = e => { if (e.key === "Enter") doScan(); };
  if (!pendingScan && scanInp) setTimeout(() => scanInp.focus(), 50);

  const clearBtn = document.getElementById("clear-lock-btn");
  if (clearBtn) clearBtn.onclick = () => { palletLock = null; renderPick(); };

  // Pallet tools buttons
  const pickMoveBtn = document.getElementById("pick-move-btn");
  if (pickMoveBtn) pickMoveBtn.onclick = () => showPickPalletMoveModal();
  const pickEditBtn = document.getElementById("pick-edit-btn");
  if (pickEditBtn) pickEditBtn.onclick = () => showPickPalletEditModal();

  // Quick-pallet buttons
  document.querySelectorAll(".quick-pallet-btn").forEach(btn => {
    btn.onclick = () => {
      const palInp = document.getElementById("pallet-inp");
      if (palInp) {
        palInp.value = btn.dataset.pid;
        // Highlight selected button
        document.querySelectorAll(".quick-pallet-btn").forEach(b => {
          b.style.background = "var(--surface)";
          b.style.color = "var(--text)";
          b.style.borderColor = "var(--border)";
          b.querySelector("span").style.color = "var(--muted)";
        });
        btn.style.background = "var(--accent)";
        btn.style.color = "#000";
        btn.style.borderColor = "var(--accent)";
        btn.querySelector("span").style.color = "#000";
        document.getElementById("qty-inp")?.focus();
      }
    };
  });

  if (pendingScan) {
    // Cancel (always present)
    const cancelBtn = document.getElementById("cancel-btn");
    if (cancelBtn) cancelBtn.onclick = () => {
      pendingScan = null; palletLock = null; palletChoice = null; custOverride = null; renderPick();
    };

    // Back → returns to join/new choice
    const backBtn = document.getElementById("back-btn");
    if (backBtn) backBtn.onclick = () => { palletChoice = null; renderPick(); };

    // Step 1: Join or New
    const btnJoin = document.getElementById("btn-join-pallet");
    const btnNew  = document.getElementById("btn-new-pallet");
    if (btnJoin) btnJoin.onclick = () => { palletChoice = "join"; renderPick(); };
    if (btnNew)  btnNew.onclick  = () => { palletChoice = "new";  renderPick(); };

    // Step 2 Join: camera scan button opens camera
    const camBtn = document.getElementById("cam-scan-btn");
    if (camBtn) {
      camBtn.onclick = () => {
        scanWithCamera(val => {
          const pi = document.getElementById("pallet-inp");
          if (pi) { pi.value = val; pi.style.borderColor = "var(--blue)"; }
          showToast("🪟 " + val + " scanned — set qty and confirm", "var(--blue)");
          document.getElementById("qty-inp")?.focus();
        });
      };
      // Auto-trigger camera immediately when join screen appears
      if (palletChoice === "join") setTimeout(() => camBtn.click(), 200);
    }

    // Step 2: pallet/qty field events
    const palInp = document.getElementById("pallet-inp");
    const qtyInp = document.getElementById("qty-inp");
    if (palInp) {
      palInp.onkeydown = e => { if (e.key === "Enter") qtyInp?.focus(); };
      palInp.onfocus = function() { this.select(); };
      if (palletChoice === "new") setTimeout(() => palInp.focus(), 80);
    }
    if (qtyInp) {
      qtyInp.onkeydown = e => { if (e.key === "Enter") doConfirm(); };
      qtyInp.onfocus = function() { this.select(); };
    }

    // Customer switch buttons
    document.querySelectorAll(".cust-switch-btn").forEach(btn => {
      btn.onclick = () => {
        custOverride = btn.dataset.cust;
        // Update pendingScan type to match new destination
        if (custOverride === 'Building 715') {
          pendingScan.type = 'b715';
          pendingScan.destCustomer = null;
        } else {
          pendingScan.type = 'order';
          pendingScan.destCustomer = custOverride;
        }
        renderPick();
      };
    });

    // Confirm
    const confBtn = document.getElementById("confirm-btn");
    if (confBtn) confBtn.onclick = doConfirm;
  }
}

function nextPalletNum() {
  const nums = Object.keys(liveData.pallets)
    .filter(p => /^CF\d{5}$/.test(p))
    .map(p => parseInt(p.slice(2)));
  const n = nums.length ? Math.max(...nums) + 1 : 1;
  return "CF" + String(n).padStart(5, "0");
}


function scanWithCamera(onResult) {
  // Use BarcodeDetector API if available (Chrome Android, Safari 17+)
  // Fallback: open file input with capture="environment" which triggers camera on mobile
  if (typeof BarcodeDetector !== "undefined") {
    BarcodeDetector.getSupportedFormats().then(() => {
      const detector = new BarcodeDetector({ formats: ["code_128", "qr_code", "code_39", "ean_13"] });
      // Create a hidden video element to stream camera
      const overlay = document.createElement("div");
      overlay.id = "cam-overlay";
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px";
      overlay.innerHTML =
        "<div style='color:var(--accent);font-family:var(--font);font-size:1.4rem;font-weight:900;letter-spacing:.06em'>SCAN PALLET BARCODE</div>" +
        "<video id='cam-video' style='width:min(340px,90vw);border-radius:10px;border:3px solid var(--accent)' autoplay playsinline muted></video>" +
        "<div style='color:var(--muted);font-size:.85rem'>Point camera at the barcode on the pallet tag</div>" +
        "<button onclick='window._stopCamScan()' style='background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:var(--font);font-weight:800;font-size:1rem;cursor:pointer'>✕ CANCEL</button>";
      document.body.appendChild(overlay);

      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          const video = document.getElementById("cam-video");
          video.srcObject = stream;
          window._camStream = stream;

          const scanLoop = () => {
            if (!document.getElementById("cam-overlay")) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
              detector.detect(video).then(barcodes => {
                if (barcodes.length > 0) {
                  const val = barcodes[0].rawValue;
                  window._stopCamScan();
                  onResult(val.toUpperCase());
                }
              }).catch(() => {});
            }
            requestAnimationFrame(scanLoop);
          };
          video.onloadedmetadata = () => requestAnimationFrame(scanLoop);
        })
        .catch(() => {
          window._stopCamScan();
          fallbackFileCapture(onResult);
        });
    });
  } else {
    fallbackFileCapture(onResult);
  }
}

function fallbackFileCapture(onResult) {
  // Fallback: file input with camera capture — works on all mobile browsers
  // Uses ZXing via CDN to decode the captured image
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";
  inp.capture = "environment";
  inp.style.display = "none";
  document.body.appendChild(inp);
  inp.onchange = () => {
    const file = inp.files[0];
    if (!file) { document.body.removeChild(inp); return; }
    const reader = new FileReader();
    reader.onload = e => {
      document.body.removeChild(inp);
      decodeBarcode(e.target.result, onResult);
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function decodeBarcode(dataUrl, onResult) {
  // Use ZXing-js if available, otherwise show manual entry toast
  if (typeof ZXing !== "undefined") {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext("2d").drawImage(img, 0, 0);
      const codeReader = new ZXing.BrowserMultiFormatReader();
      codeReader.decodeFromCanvas(canvas).then(result => {
        onResult(result.getText().toUpperCase());
      }).catch(() => {
        showToast("Couldn't read barcode — type it manually", "var(--accent)");
      });
    };
    img.src = dataUrl;
  } else {
    showToast("Type pallet # manually or update browser", "var(--accent)");
  }
}

window._stopCamScan = function() {
  if (window._camStream) {
    window._camStream.getTracks().forEach(t => t.stop());
    window._camStream = null;
  }
  const overlay = document.getElementById("cam-overlay");
  if (overlay) overlay.remove();
};

function isPalletId(s) {
  return /^CF\d{5}$/.test(s);
}

function doScan() {
  const inp = document.getElementById("scan-inp");
  if (!inp) return;
  const raw = inp.value.trim().toUpperCase();
  if (!raw) return;
  inp.value = "";

  // Pallet barcode scanned
  if (isPalletId(raw)) {
    if (pendingScan) {
      // Fill the pallet field directly
      const palInp = document.getElementById("pallet-inp");
      if (palInp) {
        palInp.value = raw;
        palInp.style.borderColor = "var(--green)";
        showToast("🪟 Pallet " + raw + " — enter qty and confirm", "var(--green)");
        document.getElementById("qty-inp")?.focus();
      }
    } else {
      palletLock = raw;
      showToast("🪟 Pallet " + raw + " locked — scan a product", "var(--accent)");
      renderPick();
    }
    return;
  }

  // Product code scanned
  const orders = ORDER_LOOKUP[raw];
  if (!orders) {
    pendingScan = { type: "notfound", code: raw, desc: "", destCustomer: null };
    renderPick();
    return;
  }

  // Separate real orders from 715-routed entries
  const realOrders = orders.filter(o => o.customer !== "Building 715");
  const b715Entry  = orders.find(o => o.customer === "Building 715");

  // Calculate fills from pallet data (accurate, not stale picks counter)
  const palletFills = {}; // customer -> qty on pallets
  for (const pd of Object.values(liveData.pallets)) {
    for (const it of Object.values(pd.items || {})) {
      if (it.item !== raw) continue;
      const cust = it.customer || "715";
      palletFills[cust] = (palletFills[cust] || 0) + (it.qty || 1);
    }
  }

  // Find first unfilled real order
  let destCustomer = null;
  for (const ord of realOrders) {
    const filled = palletFills[ord.customer] || 0;
    // Allow over-filling: only skip if strictly at/over the ordered qty
    // AND we haven't explicitly been asked to go here
    if (filled < ord.qty) { destCustomer = ord.customer; break; }
  }
  // If all filled but there are real orders, still offer the first customer
  // so workers can add overflow inventory
  if (!destCustomer && realOrders.length > 0) {
    destCustomer = realOrders[0].customer;
  }

  const type = destCustomer ? "order" : "b715";

  pendingScan = {
    type,
    code: raw,
    desc: orders[0].desc || "",
    destCustomer,
  };
  renderPick();
}

async function doConfirm() {
  if (saving || !pendingScan) return;
  const palInp = document.getElementById("pallet-inp");
  const qtyInp = document.getElementById("qty-inp");
  if (!palInp) return;
  const pid = palInp.value.trim().toUpperCase();
  if (!pid) { palInp.style.borderColor = "var(--red)"; palInp.focus(); return; }
  const qty = Math.max(1, parseInt(qtyInp?.value) || 1);

  saving = true;
  const confBtn = document.getElementById("confirm-btn");
  if (confBtn) { confBtn.disabled = true; confBtn.textContent = "SAVING..."; }

  const p = pendingScan;
  const code = p.code;
  const ts = Date.now();
  // If worker explicitly switched customer, respect that — never force to 715
  const effectiveCust = custOverride || p.destCustomer;
  const is715 = !effectiveCust || ((p.type === "b715" || p.type === "notfound") && !custOverride);
  if (effectiveCust && !is715) p.destCustomer = effectiveCust; // apply override
  const updates = {};

  let orderQty = 0, b715Qty = 0;
  if (is715) {
    b715Qty = qty;
  } else {
    // Calculate filled from actual pallet data (not stale picks counter)
    let palletFilled = 0;
    for (const pd of Object.values(liveData.pallets)) {
      for (const it of Object.values(pd.items || {})) {
        if (it.item === code && it.customer === p.destCustomer) {
          palletFilled += (it.qty || 1);
        }
      }
    }
    const orderedQty = ORDER_LOOKUP[code]?.find(o => o.customer === p.destCustomer)?.qty || 0;
    const needed = Math.max(0, orderedQty - palletFilled);
    // If worker explicitly chose this customer, put ALL qty to that customer
    // (allows over-filling when more inventory is found than expected)
    orderQty = qty;
    b715Qty = 0;
    // Only auto-split to 715 if there's truly no order for this item+customer
    if (orderedQty === 0) {
      orderQty = 0;
      b715Qty = qty;
    }
  }

  if (orderQty > 0) {
    const cur = (liveData.picks[code] || {})[p.destCustomer] || 0;
    updates["tracker/picks/" + code + "/" + p.destCustomer] = cur + orderQty;
  }
  if (b715Qty > 0) {
    const cur = (liveData.picks[code] || {})["_715"] || 0;
    updates["tracker/picks/" + code + "/_715"] = cur + b715Qty;
  }

  // Log entry
  const logKey = "tracker/log/" + ts + "_" + Math.random().toString(36).slice(2, 7);
  updates[logKey] = {
    ts, worker: workerName, item: code,
    desc: p.desc || (ORDER_LOOKUP[code]?.[0]?.desc) || code,
    dest: is715 ? "Building 715" : "Order: " + p.destCustomer,
    customer: is715 ? "715" : p.destCustomer,
    pallet: pid, type: is715 ? "b715" : "order", qty
  };

  // Pallet
  const existing = liveData.pallets[pid];
  const newItem = { item: code, desc: p.desc || "", worker: workerName, ts, customer: is715 ? "715" : p.destCustomer, qty };
  if (existing) {
    const existingKeys = Object.keys(existing.items || {}).map(Number);
    const nextIdx = existingKeys.length > 0 ? Math.max(...existingKeys) + 1 : 0;
    updates["tracker/pallets/" + pid + "/items/" + nextIdx] = newItem;
  } else {
    updates["tracker/pallets/" + pid + "/dest"] = is715 ? "Building 715" : "Order: " + p.destCustomer;
    updates["tracker/pallets/" + pid + "/created"] = ts;
    updates["tracker/pallets/" + pid + "/items/0"] = newItem;
  }

  try {
    await update(ref(db), updates);
    const splitNote = (orderQty > 0 && b715Qty > 0)
      ? ' <span style="font-size:.75rem;color:var(--muted)">(' + orderQty + ' → order, ' + b715Qty + ' → 715)</span>' : "";
    lastResultHtml =
      '<div class="card p16 mb16">' +
        '<div class="section-lbl">Last confirmed</div>' +
        '<div class="flex center gap10 wrap">' +
          '<span style="font-family:var(--font);font-weight:800;font-size:1.1rem;color:var(--accent)">' + esc(code) + '</span>' +
          '<span style="font-family:var(--font);font-weight:700">×' + qty + '</span>' +
          splitNote +
          '<span class="badge b-amber">🪟 ' + esc(pid) + '</span>' +
        '</div>' +
      '</div>';
    pendingScan = null;
    palletLock = null;
    palletChoice = null;
    custOverride = null;
    saving = false;
    renderPick();
    showToast("✓ " + qty + " unit" + (qty > 1 ? "s" : "") + " saved to " + pid, "var(--green)");
  } catch(e) {
    saving = false;
    showToast("Save failed — check connection", "var(--red)");
    if (confBtn) { confBtn.disabled = false; confBtn.textContent = "CONFIRM ✓"; }
  }
}

function orderStatus(code) {
  return (ORDER_LOOKUP[code] || []).map(o => ({
    customer: o.customer,
    remaining: Math.max(0, o.qty - ((liveData.picks[code] || {})[o.customer] || 0))
  }));
}

// ═══════════════════════════════════════════════════════
// MANAGER VIEW
// ═══════════════════════════════════════════════════════
function updateManagerKPIs() {
  // Lightweight KPI refresh without full re-render
  // Just update the KPI card values in place if they exist
  const el = document.getElementById("main-content");
  if (!el || !el.querySelector(".kpi-grid")) return;
  // If KPI elements exist, re-render just the top KPI section
  // For simplicity, only do full re-render if on orders/summary tab
  if (subTab === "orders" || subTab === "summary") {
    refreshSubTab();
  }
}

function renderManager() {
  const mc = document.getElementById("main-content");
  if (!mc) return;

  let totalOrd=0, totalFill=0, bOrd=0, bFill=0, sOrd=0, sFill=0, kaOrd=0, kaFill=0;
  let b715Ord=0, b715Fill=0;

  for (const row of ORDER_DATA) {
    const k = row.item.toUpperCase();
    if (row.customer === "Building 715") {
      // 715 warehouse — track separately using pallet data (not picks counter)
      b715Ord += row.qty;
      continue;
    }
    const f = Math.min((liveData.picks[k] || {})[row.customer] || 0, row.qty);
    totalOrd += row.qty; totalFill += f;
    if (row.customer === "Beall's") { bOrd += row.qty; bFill += f; }
    else if (row.customer === "Key Account") { kaOrd += row.qty; kaFill += f; }
    else { sOrd += row.qty; sFill += f; }
  }

  // Calculate 715 fill from actual pallet data (immune to stale picks counters)
  for (const pdata of Object.values(liveData.pallets)) {
    if (!(pdata.dest || "").includes("715")) continue;
    for (const it of Object.values(pdata.items || {})) {
      b715Fill += (it.qty || 1);
    }
  }

  const pct    = totalOrd ? Math.round(totalFill / totalOrd * 100) : 0;
  const bPct   = bOrd ? Math.round(bFill / bOrd * 100) : 0;
  const sPct   = sOrd ? Math.round(sFill / sOrd * 100) : 0;
  const kaPct  = kaOrd ? Math.round(kaFill / kaOrd * 100) : 0;
  const b715Pct = b715Ord ? Math.min(100, Math.round(b715Fill / b715Ord * 100)) : 0;

  let html = '<div class="main">';

  // KPIs
  html += '<div class="kpi-grid mb20">';
  html += kpi("OVERALL", pct + "%", totalFill.toLocaleString() + " / " + totalOrd.toLocaleString() + " units", "var(--accent)");
  html += kpi("BEALL'S", bPct + "%", bFill.toLocaleString() + " / " + bOrd.toLocaleString(), "var(--bealls)");
  html += kpi("SJL", sPct + "%", sFill.toLocaleString() + " / " + sOrd.toLocaleString(), "var(--sjl)");
  html += kpi("KEY ACCOUNT", kaPct + "%", kaFill.toLocaleString() + " / " + kaOrd.toLocaleString(), "var(--ka)");
  html += kpi("→ BLDG 715", b715Pct + "%", b715Fill.toLocaleString() + " / " + b715Ord.toLocaleString() + " units", "var(--purple)");
  html += '</div>';

  // Progress bar
  html += '<div class="card p16 mb20">';
  html += '<div class="flex between mb8"><span class="section-lbl" style="margin:0">OVERALL FILL</span><span style="font-family:var(--font);font-weight:700;color:var(--accent)">' + pct + '%</span></div>';
  html += '<div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">';
  html += '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px;transition:width .5s"></div>';
  html += '</div></div>';

  // Sub-tab nav + export
  html += '<div class="flex between center mb16 wrap gap10">';
  html += '<div class="flex gap8">';
  html += '<button class="btn-tab ' + (subTab==="orders"?"active":"") + '" id="st-orders" onclick="window._setSubTab(\'orders\')">📋 ORDERS</button>';
  html += '<button class="btn-tab ' + (subTab==="pallets"?"active":"") + '" id="st-pallets" onclick="window._setSubTab(\'pallets\')">🪟 PALLETS</button>';
  html += '<button class="btn-tab ' + (subTab==="activity"?"active":"") + '" id="st-activity" onclick="window._setSubTab(\'activity\')">⚡ ACTIVITY</button>';
  html += '<button class="btn-tab ' + (subTab==="summary"?"active":"") + '" id="st-summary" onclick="window._setSubTab(\'summary\')">📊 SUMMARY</button>';
  html += '</div>';
  html += '<button class="btn btn-outline btn-sm" id="export-btn" style="color:var(--green);border-color:var(--green)">⬇ EXPORT EXCEL</button>';
  html += '<button class="btn btn-outline btn-sm" id="recalc-btn" style="color:var(--accent);border-color:var(--accent)">🔄 RECALC COUNTS</button>';
  html += '</div>';

  // Sub-tab content
  html += '<div id="subtab">';
  if (subTab === "orders")  html += buildOrdersTable();
  else if (subTab === "pallets") html += buildPalletsView();
  else html += buildActivityFeed();
  html += '</div>';

  html += '</div>'; // main
  mc.innerHTML = html;

  // Events — no inline onclick
  const _so = document.getElementById("st-orders");   if(_so) _so.onclick  = () => { subTab="orders";  refreshSubTab(); };
  const _sp = document.getElementById("st-pallets");  if(_sp) _sp.onclick  = () => { subTab="pallets"; refreshSubTab(); };
  const _sa = document.getElementById("st-activity"); if(_sa) _sa.onclick  = () => { subTab="activity";refreshSubTab(); };
  const _ss = document.getElementById("st-summary");  if(_ss) _ss.onclick  = () => { subTab="summary"; refreshSubTab(); };
  document.getElementById("export-btn").onclick = exportExcel;
  document.getElementById("recalc-btn").onclick = recalcAllCounts;

  attachManagerEvents();
}

function refreshSubTab() {
  const el = document.getElementById("subtab");
  if (!el) return;
  document.querySelectorAll(".btn-tab").forEach(b => {
    b.classList.toggle("active",
      (subTab==="orders"   && b.id==="st-orders")   ||
      (subTab==="pallets"  && b.id==="st-pallets")  ||
      (subTab==="activity" && b.id==="st-activity") ||
      (subTab==="summary"  && b.id==="st-summary"));
  });
  try {
    if (subTab==="orders")        el.innerHTML = buildOrdersTable();
    else if (subTab==="pallets")  el.innerHTML = buildPalletsView();
    else if (subTab==="summary")  el.innerHTML = buildPalletSummary();
    else                          el.innerHTML = buildActivityFeed();
  } catch(e) {
    console.error('[refreshSubTab]', e);
    el.innerHTML = '<div class="empty" style="color:var(--red)">Error: ' + esc(String(e)) + '</div>';
  }
  attachManagerEvents();
}

function attachManagerEvents() {
  // Filter buttons
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.onclick = () => { filterKey = btn.dataset.f; refreshSubTab(); };
  });
  // Sort headers
  document.querySelectorAll("th[data-col]").forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
      refreshSubTab();
    };
  });
  // Search
  const srch = document.getElementById("tbl-search");
  if (srch) srch.oninput = e => { searchStr = e.target.value; refreshSubTab(); };

  // Pallet buttons
  document.querySelectorAll(".pallet-print-btn").forEach(btn => {
    btn.onclick = () => printPalletTag(btn.dataset.pid);
  });
  document.querySelectorAll(".pallet-edit-btn").forEach(btn => {
    btn.onclick = () => editPalletModal(btn.dataset.pid);
  });

  // Pallet sort buttons
  document.querySelectorAll(".sort-pallet-btn").forEach(btn => {
    btn.onclick = () => {
      const col = btn.dataset.col;
      if (palletSortCol === col) palletSortAsc = !palletSortAsc;
      else { palletSortCol = col; palletSortAsc = col === "pid" || col === "worker" || col === "customer"; }
      refreshSubTab();
    };
  });

  // Activity sort buttons
  document.querySelectorAll(".sort-act-btn").forEach(btn => {
    btn.onclick = () => {
      const col = btn.dataset.col;
      if (actSortCol === col) actSortAsc = !actSortAsc;
      else { actSortCol = col; actSortAsc = col !== "ts"; }
      refreshSubTab();
    };
  });

  // Activity filter dropdowns
  const wSel = document.getElementById("act-worker-sel");
  if (wSel) wSel.onchange = () => { actFilterWorker = wSel.value; refreshSubTab(); };
  const cSel = document.getElementById("act-cust-sel");
  if (cSel) cSel.onchange = () => { actFilterCust = cSel.value; refreshSubTab(); };

  // Activity row reassign buttons
  document.querySelectorAll(".reassign-log-btn").forEach(btn => {
    btn.onclick = () => showReassignModal(
      btn.dataset.key, btn.dataset.item,
      btn.dataset.pallet, parseInt(btn.dataset.qty),
      btn.dataset.cust
    );
  });

  // Order row expand/collapse on click
  document.querySelectorAll("tr.order-row").forEach(row => {
    row.onclick = () => {
      const item = row.dataset.item;
      const detailRow = document.querySelector("tr.order-detail-row[data-item='" + item.replace(/'/g,"\'") + "']");
      if (!detailRow) return;
      const isOpen = detailRow.style.display !== "none";
      // Close all open detail rows first
      document.querySelectorAll("tr.order-detail-row").forEach(r => r.style.display = "none");
      document.querySelectorAll("tr.order-row").forEach(r => r.style.background = "");
      if (!isOpen) {
        detailRow.style.display = "";
        row.style.background = "var(--surface)";
      }
    };
  });
}

function kpi(label, val, sub, color) {
  return '<div class="card kpi">' +
    '<div class="kpi-lbl">' + label + '</div>' +
    '<div class="kpi-val" style="color:' + color + '">' + val + '</div>' +
    '<div class="kpi-sub">' + sub + '</div>' +
    '</div>';
}

// ─── Orders table ────────────────────────────────────────────
function buildOrdersTable() {
  // ── Build pallet index: itemCode -> [{palletId, dest, qty, worker, ts}]
  const palletIndex = {};
  for (const [pid, pdata] of Object.entries(liveData.pallets)) {
    for (const it of Object.values(pdata.items || {})) {
      const code = it.item.toUpperCase();
      if (!palletIndex[code]) palletIndex[code] = [];
      palletIndex[code].push({
        pid, dest: pdata.dest || "", qty: it.qty || 1,
        worker: it.worker || "", ts: it.ts || 0, customer: it.customer || ""
      });
    }
  }

  // ── Build rows from ORDER_DATA (all customers including Building 715)
  let rows = ORDER_DATA.map(row => {
    const k = row.item.toUpperCase();
    const pallets = palletIndex[k] || [];
    // filled = sum of qty on pallets matching this customer destination
    let filled = 0;
    for (const p of pallets) {
      const pCust = p.customer;
      if (row.customer === "Building 715") {
        if (p.dest && p.dest.includes("715")) filled += p.qty;
      } else {
        if (pCust === row.customer) filled += p.qty;
      }
    }
    filled = Math.min(filled, row.qty);
    const pct = row.qty > 0 ? Math.min(100, Math.round(filled / row.qty * 100)) : 100;
    const st = getStatus(row.item);
    return { ...row, k, filled, pct, remaining: Math.max(0, row.qty - filled), pallets, status: st.full, statusColor: st.color };
  });

  // ── Filters
  if (filterKey === "bealls")   rows = rows.filter(r => r.customer === "Beall's");
  else if (filterKey === "sjl") rows = rows.filter(r => r.customer === "SJL");
  else if (filterKey === "ka")   rows = rows.filter(r => r.customer === "Key Account");
  else if (filterKey === "b715") rows = rows.filter(r => r.customer === "Building 715");
  else if (filterKey === "done")    rows = rows.filter(r => r.filled >= r.qty && r.qty > 0);
  else if (filterKey === "pending") rows = rows.filter(r => r.filled < r.qty);

  if (searchStr) {
    const s = searchStr.toLowerCase();
    rows = rows.filter(r => r.item.toLowerCase().includes(s) || r.desc.toLowerCase().includes(s));
  }

  rows.sort((a, b) => {
    let va = a[sortCol] ?? "", vb = b[sortCol] ?? "";
    if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0) : (va < vb ? 1 : va > vb ? -1 : 0);
  });

  const filters = [
    {f:"all",     lbl:"All"},
    {f:"bealls",  lbl:"Beall's"},
    {f:"sjl",     lbl:"SJL"},
    {f:"ka",      lbl:"Key Account"},
    {f:"b715",    lbl:"→ 715"},
    {f:"done",    lbl:"✓ Done"},
    {f:"pending", lbl:"Pending"},
  ];

  let html = '<div class="flex center gap10 mb12 wrap">';
  html += '<input id="tbl-search" class="inp inp-sm" placeholder="🔍 Search item # or description..." value="' + esc(searchStr) + '" style="width:260px">';
  html += '<div class="flex gap8 wrap">';
  for (const f of filters) {
    const active = filterKey === f.f;
    html += '<button class="btn btn-outline btn-sm filter-btn' + (active?" active":"") +
      '" data-f="' + f.f + '" style="border-radius:20px;' + (active?"border-color:var(--accent);color:var(--accent)":"") + '">' + f.lbl + '</button>';
  }
  html += '</div></div>';

  const cols = [
    {col:"item",lbl:"Item #"},{col:"desc",lbl:"Description"},{col:"customer",lbl:"Customer"},
    {col:"status",lbl:"Status"},{col:"qty",lbl:"Ordered"},{col:"filled",lbl:"Filled"},{col:"remaining",lbl:"Remaining"},{col:"pct",lbl:"Progress"}
  ];

  html += '<div class="tbl-wrap"><table><thead><tr>';
  for (const col of cols) {
    html += '<th data-col="' + col.col + '">' + col.lbl + (sortCol===col.col?(sortAsc?" ↑":" ↓"):"") + '</th>';
  }
  html += '</tr></thead><tbody>';

  if (!rows.length) {
    html += '<tr><td colspan="7" class="empty">No items match</td></tr>';
  } else {
    for (const r of rows) {
      const done = r.filled >= r.qty && r.qty > 0;
      const is715 = r.customer === "Building 715";
      const custBadge = is715
        ? '<span class="badge b-purple">→ 715</span>'
        : r.customer === "Key Account"
        ? '<span class="badge b-ka">Key Account</span>'
        : '<span class="badge ' + (r.customer==="Beall's"?"b-bealls":"b-sjl") + '">' + esc(r.customer) + '</span>';

      // Aggregate pallets for this item
      const palletsSummary = r.pallets.length
        ? r.pallets.map(p => '<span class="item-tag" style="font-size:.7rem;cursor:default" title="' +
            esc(p.worker) + ' · ' + new Date(p.ts).toLocaleString() + '">🪟' + esc(p.pid) + ' ×' + p.qty + '</span>').join("")
        : '<span style="font-size:.7rem;color:var(--muted)">not palletized yet</span>';

      html += '<tr class="order-row" data-item="' + esc(r.item) + '" style="cursor:pointer">' +
        '<td style="font-family:var(--font);font-weight:700;color:var(--accent)">' + esc(r.item) + '</td>' +
        '<td style="font-size:.78rem;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(r.desc) + '">' + esc(r.desc) + '</td>' +
        '<td>' + custBadge + '</td>' +
        '<td><span style="font-size:.72rem;font-weight:700;color:' + r.statusColor + '">' + esc(r.status) + '</span></td>' +
        '<td style="text-align:right">' + r.qty + '</td>' +
        '<td style="text-align:right;color:var(--green);font-weight:600">' + r.filled + '</td>' +
        '<td style="text-align:right;color:' + (r.remaining>0?"var(--accent)":"var(--muted)") + '">' + r.remaining + '</td>' +
        '<td><div class="flex center gap8"><div class="prog"><div class="prog-fill" style="width:' + r.pct + '%;background:' + (done?"var(--purple)":"var(--green)") + '"></div></div><span style="font-size:.72rem;color:var(--muted)">' + r.pct + '%</span></div></td>' +
        '</tr>';

      // Expandable detail row (hidden by default)
      html += '<tr class="order-detail-row" data-item="' + esc(r.item) + '" style="display:none">' +
        '<td colspan="7" style="background:var(--surface);padding:10px 16px;border-bottom:2px solid var(--border)">' +
        '<div style="font-size:.72rem;color:var(--muted);font-family:var(--font);font-weight:700;letter-spacing:.08em;margin-bottom:8px">PALLETS CONTAINING ' + esc(r.item) + '</div>' +
        '<div class="flex wrap gap8" style="margin-bottom:8px">' + palletsSummary + '</div>';

      // Detailed pallet breakdown table
      if (r.pallets.length) {
        html += '<table style="width:100%;font-size:.75rem;border-collapse:collapse;margin-top:4px">' +
          '<thead><tr style="background:var(--card)">' +
          '<th style="padding:4px 10px;text-align:left;color:var(--muted);font-size:.65rem">PALLET</th>' +
          '<th style="padding:4px 10px;text-align:left;color:var(--muted);font-size:.65rem">DESTINATION</th>' +
          '<th style="padding:4px 10px;text-align:right;color:var(--muted);font-size:.65rem">QTY</th>' +
          '<th style="padding:4px 10px;text-align:left;color:var(--muted);font-size:.65rem">WORKER</th>' +
          '<th style="padding:4px 10px;text-align:left;color:var(--muted);font-size:.65rem">TIME</th>' +
          '</tr></thead><tbody>';
        for (const p of r.pallets) {
          html += '<tr>' +
            '<td style="padding:4px 10px;font-family:var(--font);font-weight:700;color:var(--accent)">' + esc(p.pid) + '</td>' +
            '<td style="padding:4px 10px;color:var(--muted)">' + esc(p.dest) + '</td>' +
            '<td style="padding:4px 10px;text-align:right;font-weight:700">×' + p.qty + '</td>' +
            '<td style="padding:4px 10px;color:var(--muted)">' + esc(p.worker) + '</td>' +
            '<td style="padding:4px 10px;color:var(--muted)">' + new Date(p.ts).toLocaleString() + '</td>' +
            '</tr>';
        }
        html += '</tbody></table>';
      }
      html += '</td></tr>';
    }
  }
  html += '</tbody></table></div>';
  return html;
}


// ─── Pallets view ─────────────────────────────────────────────
// ══════════════════════════════════════════════════════
// PALLET SUMMARY — totals per customer
// ══════════════════════════════════════════════════════
function buildPalletSummary() {
  const customers = ["Beall's", "SJL", "Key Account", "Building 715"];
  const custColor  = {"Beall's":"var(--bealls)","SJL":"var(--sjl)","Key Account":"var(--ka)","Building 715":"var(--purple)"};
  const custBadge  = {"Beall's":"b-bealls","SJL":"b-sjl","Key Account":"b-ka","Building 715":"b-purple"};

  // Aggregate
  const stats = {};
  for (const cust of customers) stats[cust] = { pallets:0, units:0, skus: new Set() };

  for (const [pid, pd] of Object.entries(liveData.pallets)) {
    const dest = pd.dest || "";
    let cust = "Building 715";
    if (dest.includes("Beall"))    cust = "Beall's";
    else if (dest.includes("SJL")) cust = "SJL";
    else if (dest.includes("Key")) cust = "Key Account";
    stats[cust].pallets++;
    for (const it of Object.values(pd.items || {})) {
      stats[cust].units += (it.qty || 1);
      stats[cust].skus.add(it.item);
    }
  }

  const totalPallets = customers.reduce((s,k) => s + stats[k].pallets, 0);
  const totalUnits   = customers.reduce((s,k) => s + stats[k].units, 0);

  let html = '<div class="card" style="overflow:hidden">';

  // Header
  html += '<div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">';
  html += '<div style="font-family:var(--font);font-size:.7rem;font-weight:700;letter-spacing:.1em;color:var(--muted)">PALLET TOTALS BY CUSTOMER</div>';
  html += '<div style="font-size:.78rem;color:var(--muted)">' + totalPallets + ' pallets &nbsp;·&nbsp; ' + totalUnits.toLocaleString() + ' units total</div>';
  html += '</div>';

  // Table
  html += '<table style="width:100%;border-collapse:collapse">';
  html += '<thead><tr style="background:var(--surface)">';
  html += '<th style="padding:10px 18px;text-align:left;font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:1.5px solid var(--border)">CUSTOMER</th>';
  html += '<th style="padding:10px 18px;text-align:right;font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:1.5px solid var(--border)">PALLETS</th>';
  html += '<th style="padding:10px 18px;text-align:right;font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:1.5px solid var(--border)">UNITS</th>';
  html += '<th style="padding:10px 18px;text-align:right;font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:1.5px solid var(--border)">SKUs</th>';
  html += '<th style="padding:10px 18px;text-align:left;font-family:var(--font);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--muted);border-bottom:1.5px solid var(--border)">SHARE</th>';
  html += '</tr></thead><tbody>';

  for (const cust of customers) {
    const st = stats[cust];
    const pct = totalPallets > 0 ? Math.round(st.pallets / totalPallets * 100) : 0;
    const color = custColor[cust];
    html += '<tr style="border-bottom:1px solid var(--border)">';
    html += '<td style="padding:13px 18px"><span class="badge ' + custBadge[cust] + '">' + esc(cust) + '</span></td>';
    html += '<td style="padding:13px 18px;text-align:right;font-family:var(--font);font-size:1.4rem;font-weight:900;color:' + color + '">' + st.pallets + '</td>';
    html += '<td style="padding:13px 18px;text-align:right;font-family:var(--font);font-weight:700;color:var(--text)">' + st.units.toLocaleString() + '</td>';
    html += '<td style="padding:13px 18px;text-align:right;color:var(--muted)">' + st.skus.size + '</td>';
    html += '<td style="padding:13px 18px;min-width:160px">';
    html += '<div style="display:flex;align-items:center;gap:10px">';
    html += '<div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">';
    html += '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:3px"></div></div>';
    html += '<span style="font-size:.78rem;color:var(--muted);min-width:32px">' + pct + '%</span>';
    html += '</div></td></tr>';
  }

  // Total row
  html += '<tr style="background:var(--surface)">';
  html += '<td style="padding:12px 18px;font-family:var(--font);font-weight:700;color:var(--accent)">TOTAL</td>';

function buildPalletsView() {
  const rawEntries = Object.entries(liveData.pallets);
  if (!rawEntries.length) return '<div class="empty">No pallets yet</div>';

  // Enrich entries with computed fields for sorting
  const rows = rawEntries.map(([pid, pdata]) => {
    const items = Object.values(pdata.items || {});
    const workers = [...new Set(items.map(i => i.worker))];
    const customers = [...new Set(items.map(i => i.customer).filter(Boolean))];
    const totalQty = items.reduce((s, it) => s + (it.qty||1), 0);
    return { pid, pdata, items, workers, customers, totalQty };
  });

  // Sort
  rows.sort((a, b) => {
    let va, vb;
    if (palletSortCol === "pid")      { va = a.pid; vb = b.pid; }
    else if (palletSortCol === "worker")   { va = a.workers[0]||""; vb = b.workers[0]||""; }
    else if (palletSortCol === "customer") { va = a.customers[0]||""; vb = b.customers[0]||""; }
    else if (palletSortCol === "dest")     { va = a.pdata.dest||""; vb = b.pdata.dest||""; }
    else if (palletSortCol === "qty")      { va = a.totalQty; vb = b.totalQty; }
    else { va = a.pdata.created||0; vb = b.pdata.created||0; } // created (default)
    if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return palletSortAsc ? cmp : -cmp;
  });

  const cols = [
    { key:"pid",      label:"Pallet #" },
    { key:"created",  label:"Date" },
    { key:"dest",     label:"Destination" },
    { key:"worker",   label:"Worker" },
    { key:"customer", label:"Customer" },
    { key:"qty",      label:"Units" },
  ];

  const arrow = (k) => palletSortCol===k ? (palletSortAsc?" ↑":" ↓") : "";

  let html = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center">';
  html += '<span style="font-size:.7rem;color:var(--muted);font-family:var(--font);font-weight:700;letter-spacing:.08em">SORT:</span>';
  for (const col of cols) {
    const active = palletSortCol === col.key;
    html += '<button class="sort-pallet-btn btn btn-outline btn-sm" data-col="' + col.key + '" '
          + 'style="' + (active ? 'border-color:var(--accent);color:var(--accent);' : '') + '">'
          + col.label + arrow(col.key) + '</button>';
  }
  html += '</div>';

  for (const { pid, pdata, items, workers, customers, totalQty } of rows) {
    const agg = {};
    for (const it of items) {
      if (!agg[it.item]) agg[it.item] = { ...it, count: 0 };
      agg[it.item].count += (it.qty || 1);
    }
    const is715 = pdata.dest?.includes("715");
    html += '<div class="card pallet-card">';
    html += '<div class="flex center gap8 wrap mb8">';
    html += '<span class="pallet-id">🪟 ' + esc(pid) + '</span>';
    html += '<span class="badge ' + (is715?"b-purple":"b-green") + '">' + esc(pdata.dest || "") + '</span>';
    html += '<span style="font-size:.78rem;color:var(--muted);margin-left:auto">' + totalQty + ' unit' + (totalQty!==1?"s":"") + '</span>';
    html += '<button class="btn btn-outline btn-sm pallet-print-btn" data-pid="' + esc(pid) + '" style="color:var(--accent);border-color:var(--accent)">🖨 PRINT</button>';
    html += '<button class="btn btn-outline btn-sm pallet-edit-btn" data-pid="' + esc(pid) + '" style="color:var(--sjl);border-color:var(--sjl)">✏ EDIT / FIX QTY</button>';
    html += '</div>';
    html += '<div class="flex wrap gap8">';
    for (const it of Object.values(agg)) {
      html += '<span class="item-tag">'
        + '<span style="color:var(--accent);font-family:var(--font);font-weight:700">' + esc(it.item) + '</span>'
        + (it.count > 1 ? ' <span style="color:var(--muted)">×' + it.count + '</span>' : '')
        + '</span>';
    }
    html += '</div>';
    html += '<div style="margin-top:8px;font-size:.72rem;color:var(--muted)">Workers: ' + esc(workers.join(", "))
          + ' · ' + esc(customers.join(", "))
          + ' · ' + new Date(pdata.created).toLocaleString() + '</div>';
    html += '</div>';
  }
  return html;
}

function showReassignModal(logKey, itemCode, palletId, qty, currentCust) {
  const customers = ["Beall's", "SJL", "Key Account", "Building 715"];
  const custColors = {
    "Beall's":"var(--bealls)", "SJL":"var(--sjl)",
    "Key Account":"var(--ka)", "Building 715":"var(--purple)"
  };

  const div = document.createElement("div");
  div.className = "overlay";
  div.onclick = e => { if (e.target === div) closeModal(); };

  let html = '<div class="modal pop" style="max-width:420px">';
  html += '<div style="font-family:var(--font);font-size:1.4rem;font-weight:900;color:var(--accent);margin-bottom:4px">✏ REASSIGN ENTRY</div>';
  html += '<div style="color:var(--muted);font-size:.8rem;margin-bottom:16px">'
    + esc(itemCode) + ' ×' + qty + ' on pallet <strong style="color:var(--accent)">' + esc(palletId) + '</strong>'
    + '<br>Currently: <strong>' + esc(currentCust) + '</strong></div>';

  html += '<div style="font-size:.68rem;color:var(--muted);font-family:var(--font);font-weight:700;letter-spacing:.1em;margin-bottom:8px">MOVE TO CUSTOMER:</div>';
  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">';
  for (const cust of customers) {
    if (cust === currentCust) continue; // skip current
    const col = custColors[cust] || "var(--text)";
    html += '<button class="reassign-choice btn" data-cust="' + esc(cust) + '" '
      + 'style="background:none;border:2px solid ' + col + ';color:' + col + ';font-family:var(--font);font-size:1rem;font-weight:800;height:48px;border-radius:10px;cursor:pointer">'
      + esc(cust) + '</button>';
  }
  html += '</div>';
  html += '<button class="btn btn-outline w100" id="reassign-cancel">CANCEL</button>';
  html += '</div>';

  div.innerHTML = html;
  document.getElementById("modal-root").appendChild(div);

  document.getElementById("reassign-cancel").onclick = closeModal;
  div.querySelectorAll(".reassign-choice").forEach(btn => {
    btn.onclick = () => doReassignEntry(logKey, itemCode, palletId, qty, currentCust, btn.dataset.cust);
  });
}

async function doReassignEntry(logKey, itemCode, palletId, qty, oldCust, newCust) {
  const newCustField = newCust === "Building 715" ? "715" : newCust;
  const newDest = newCust === "Building 715" ? "Building 715" : "Order: " + newCust;
  const updates = {};

  // Update log entry
  if (logKey) {
    updates["tracker/log/" + logKey + "/customer"] = newCustField;
    updates["tracker/log/" + logKey + "/dest"]     = newDest;
    updates["tracker/log/" + logKey + "/type"]     = newCust === "Building 715" ? "b715" : "order";
  }

  // Update pallet items
  const pdata = liveData.pallets[palletId];
  if (pdata) {
    for (const [k, it] of Object.entries(pdata.items || {})) {
      if (it.item === itemCode) {
        updates["tracker/pallets/" + palletId + "/items/" + k + "/customer"] = newCustField;
      }
    }
  }

  const btns = document.querySelectorAll(".reassign-choice");
  btns.forEach(b => { b.disabled = true; b.textContent = "SAVING..."; });

  try {
    await update(ref(db), updates);
    closeModal();
    showToast("✓ " + itemCode + " → " + newCust + " (click RECALC COUNTS to update %)", "var(--green)");
  } catch(e) {
    console.error("[reassign]", e);
    showToast("Error: " + (e.message || String(e)), "var(--red)");
    btns.forEach(b => { b.disabled = false; b.textContent = b.dataset.cust; });
  }
}


function buildActivityFeed() {

  html += '<span style="font-size:.68rem;color:var(--muted);font-family:var(--font);font-weight:700;letter-spacing:.08em">SORT:</span>';

  // Customer filter

    html += '<option value="' + esc(cu) + '"' + (actFilterCust===cu?' selected':'') + '>' + esc(cu==="all"?"All Customers":cu) + '</option>';
  }
  html += '</select>';
  html += '</div>';

  html += '<span style="font-size:.72rem;color:var(--muted)">' + rows.length + ' / ' + liveData.log.length + ' entries</span>';
  html += '</div>';

  // ── Rows ─────────────────────────────────────────────────────────
  for (const s of rows.slice(0, 200)) {
    const isBg = s.type === "b715";

      + '<span style="font-family:var(--font);font-weight:700;color:var(--accent);min-width:70px;flex-shrink:0">' + esc(s.item) + '</span>'

function editPalletModal(pid) {

  if (addCodeInp) addCodeInp.onkeydown = e => { if (e.key === "Enter") addQtyInp?.focus(); };
  if (addQtyInp)  addQtyInp.onkeydown  = e => { if (e.key === "Enter") doAddItemToPallet(pid, addCodeInp, addQtyInp); };
  if (addCodeInp) setTimeout(() => addCodeInp.focus(), 100);
  document.getElementById("delete-pallet-btn").onclick = () => doDeletePallet(pid, agg);
  document.getElementById("save-qty-btn").onclick = () => doSaveQtyChanges(pid, div, agg);
  let selectedMoveCust = null;
  div.querySelectorAll(".move-cust-btn").forEach(btn => {
    btn.onclick = () => {
      selectedMoveCust = btn.dataset.cust;
      // Highlight selected
      div.querySelectorAll(".move-cust-btn").forEach(b => b.style.fontWeight = '');
      btn.style.fontWeight = '800';
      btn.style.opacity = '1';
      const lbl = document.getElementById('move-cust-selected');
      if (lbl) lbl.innerHTML = '→ Moving to <strong style="color:var(--accent)">' + esc(selectedMoveCust) + '</strong>';
    };
  });

  document.getElementById("move-btn").onclick = () => doMoveItems(pid, div, selectedMoveCust);
  div.querySelectorAll(".quick-pallet").forEach(btn => {
    btn.onclick = () => { document.getElementById("move-to").value = btn.dataset.p; };
  });
  div.querySelectorAll(".del-item-btn").forEach(btn => {
    btn.onclick = () => doDeleteItem(pid, btn.dataset.item, agg);
  });
}

// ── Delete entire pallet ─────────────────────────────────────────────────────
async function doDeletePallet(pid, agg) {
  if (!confirm("Delete entire pallet " + pid + " and reverse all its counts?\nThis cannot be undone.")) return;

  const updates = {};
  // Remove the whole pallet node
  updates["tracker/pallets/" + pid] = null;

  // Recalculate picks counters from scratch for every item on this pallet
  for (const [code, it] of Object.entries(agg)) {
    const customer = it.customer || "715";
    const newTotal = recalcPicks(code, customer, pid, 0);
    if (customer !== "715") {
      updates["tracker/picks/" + code + "/" + customer] = newTotal;
    } else {
      updates["tracker/picks/" + code + "/_715"] = newTotal;
    }
  }

  try {
    await update(ref(db), updates);
    closeModal();
    showToast("🗑 Pallet " + pid + " deleted", "var(--red)");
  } catch(e) {
    showToast("Delete failed — check connection", "var(--red)");
  }
}


async function doAddItemToPallet(pid, codeInp, qtyInp) {
  const code = (codeInp?.value || "").trim().toUpperCase();
  const qty  = Math.max(1, parseInt(qtyInp?.value) || 1);
  const msg  = document.getElementById("add-item-msg");

  if (!code) {
    if (msg) { msg.textContent = "Enter an item code"; msg.style.color = "var(--red)"; }
    codeInp?.focus();
    return;
  }

  const orders = ORDER_LOOKUP[code];
  const desc = orders ? (orders[0].desc || "") : "";

  const pdata = liveData.pallets[pid];
  if (!pdata) { showToast("Pallet not found", "var(--red)"); return; }
  const dest = pdata.dest || "";
  let customer = "715";
  if (dest.includes("Beall"))    customer = "Beall's";
  else if (dest.includes("SJL")) customer = "SJL";
  else if (dest.includes("Key")) customer = "Key Account";

  const ts = Date.now();
  const existingKeys = Object.keys(pdata.items || {}).map(Number);
  const nextIdx = existingKeys.length > 0 ? Math.max(...existingKeys) + 1 : 0;

  const updates = {};
  updates["tracker/pallets/" + pid + "/items/" + nextIdx] = {
    item: code, desc: desc, worker: workerName, ts: ts, customer: customer, qty: qty
  };

  if (customer === "715") {
    const cur = (liveData.picks[code] || {})["_715"] || 0;
    updates["tracker/picks/" + code + "/_715"] = cur + qty;
  } else {
    const cur = (liveData.picks[code] || {})[customer] || 0;
    updates["tracker/picks/" + code + "/" + customer] = cur + qty;
  }

  const logKey = "tracker/log/" + ts + "_" + Math.random().toString(36).slice(2, 7);
  updates[logKey] = {
    ts: ts, worker: workerName, item: code, desc: desc,
    dest: customer === "715" ? "Building 715" : "Order: " + customer,
    customer: customer === "715" ? "715" : customer,
    pallet: pid, type: customer === "715" ? "b715" : "order", qty: qty
  };

  const addBtn = document.getElementById("add-item-btn");
  if (addBtn) { addBtn.disabled = true; addBtn.textContent = "SAVING..."; }

  try {
    await update(ref(db), updates);
    if (codeInp) codeInp.value = "";
    if (qtyInp)  qtyInp.value = "1";
    if (msg) { msg.textContent = "OK: " + code + " x" + qty + " added to " + pid; msg.style.color = "var(--green)"; }
    if (addBtn) { addBtn.disabled = false; addBtn.textContent = "+ ADD"; }
    codeInp?.focus();
  } catch(e) {
    if (msg) { msg.textContent = "Error: " + (e.message || String(e)); msg.style.color = "var(--red)"; }
    if (addBtn) { addBtn.disabled = false; addBtn.textContent = "+ ADD"; }
  }
}

// ── Save qty edits ────────────────────────────────────────────────────────────
// Helper: recalculate picks counter for a code+customer by summing across ALL pallets
// Takes an optional override {pid, code, newQty} to apply before summing
function recalcPicks(code, customer, overridePid, overrideQty) {
  let total = 0;
  for (const [palletId, pdata] of Object.entries(liveData.pallets)) {
    for (const it of Object.values(pdata.items || {})) {
      if (it.item !== code) continue;
      const itCust = it.customer || "715";
      if (itCust !== customer) continue;
      if (palletId === overridePid) continue; // skip — we apply override below
      total += (it.qty || 1);
    }
  }
  // Add override qty for the pallet being edited
  if (overridePid !== null) total += overrideQty;
  return Math.max(0, total);
}

async function doSaveQtyChanges(pid, modalEl, agg) {
  const inputs = modalEl.querySelectorAll(".qty-edit-inp");
  const updates = {};
  let changed = 0;

  for (const inp of inputs) {
    const code = inp.dataset.item;
    const newQty = parseInt(inp.value);
    if (isNaN(newQty) || newQty < 0) continue;
    const it = agg[code];
    if (!it) continue;
    if (newQty === it.totalQty) continue; // no change

    // Update pallet items — consolidate to first key, nullify duplicates
    const firstKey = it.keys[0];
    if (newQty === 0) {
      for (const k of it.keys) {
        updates["tracker/pallets/" + pid + "/items/" + k] = null;
      }
    } else {
      updates["tracker/pallets/" + pid + "/items/" + firstKey + "/qty"] = newQty;
      for (let i = 1; i < it.keys.length; i++) {
        updates["tracker/pallets/" + pid + "/items/" + it.keys[i]] = null;
      }
    }

    // Recalculate picks counter from scratch across all pallets
    const customer = it.customer || "715";
    const newTotal = recalcPicks(code, customer, pid, newQty);
    if (customer !== "715") {
      updates["tracker/picks/" + code + "/" + customer] = newTotal;
    } else {
      updates["tracker/picks/" + code + "/_715"] = newTotal;
    }
    changed++;
  }

  if (!changed) { showToast("No changes to save", "var(--muted)"); return; }

  const btn = document.getElementById("save-qty-btn");
  if (btn) { btn.textContent = "SAVING..."; btn.disabled = true; }
  try {
    await update(ref(db), updates);
    closeModal();
    showToast("✓ " + changed + " item(s) updated", "var(--green)");
  } catch(e) {
    showToast("Save failed — check connection", "var(--red)");
    if (btn) { btn.textContent = "💾 SAVE QTY CHANGES"; btn.disabled = false; }
  }
}

// ── Delete single item from pallet ────────────────────────────────────────────
async function doDeleteItem(pid, code, agg) {
  const it = agg[code];
  if (!it) return;
  if (!confirm("Delete " + code + " (×" + it.totalQty + ") from pallet " + pid + "?")) return;

  const rawItems = liveData.pallets[pid]?.items || {};
  const updates = {};
  for (const k of it.keys) {
    updates["tracker/pallets/" + pid + "/items/" + k] = null;
  }
  // Recalculate picks counter from scratch (removing this item entirely)
  const customer = it.customer || "715";
  const newTotal = recalcPicks(code, customer, pid, 0);
  if (customer !== "715") {
    updates["tracker/picks/" + code + "/" + customer] = newTotal;
  } else {
    updates["tracker/picks/" + code + "/_715"] = newTotal;
  }

  try {
    await update(ref(db), updates);
    closeModal();
    showToast("🗑 " + code + " removed from " + pid, "var(--red)");
  } catch(e) {
    showToast("Delete failed — check connection", "var(--red)");
  }
}

async function doMoveItems(fromPid, modalEl, newCustomer) {
  const checked = [...modalEl.querySelectorAll("input.move-chk:checked")].map(c => c.dataset.item);
  const toPid   = (document.getElementById("move-to")?.value || "").trim().toUpperCase();
  if (!checked.length) { showToast("Check items to move first", "var(--accent)"); return; }
  if (!toPid)          { showToast("Enter a destination pallet #", "var(--red)"); return; }
  if (toPid === fromPid) { showToast("Same pallet!", "var(--accent)"); return; }

  const fromPallet = liveData.pallets[fromPid];
  if (!fromPallet) return;

  // Separate items to keep vs move
  const keepItems = {}, moveItems = [];
  let keepIdx = 0;
  for (const it of Object.values(fromPallet.items || {})) {
    if (checked.includes(it.item)) moveItems.push({...it});
    else keepItems[keepIdx++] = it;
  }

  // Determine dest customer label for the pallet record
  const destCust = newCustomer || null;
  const destLabel = destCust === "Building 715" ? "Building 715"
    : destCust ? "Order: " + destCust
    : null; // will inherit from existing dest pallet or fromPallet

  const updates = {};

  // Remove moved items from source pallet (or delete pallet if empty)
  if (!Object.keys(keepItems).length) updates["tracker/pallets/" + fromPid] = null;
  else updates["tracker/pallets/" + fromPid + "/items"] = keepItems;

  // Write moved items to dest pallet with updated customer field
  const destPallet = liveData.pallets[toPid];
  const destCount  = destPallet ? Object.keys(destPallet.items || {}).length : 0;
  for (let i = 0; i < moveItems.length; i++) {
    const item = {...moveItems[i], movedFrom: fromPid};
    if (destCust) {
      item.customer = destCust === "Building 715" ? "715" : destCust;
    }
    updates["tracker/pallets/" + toPid + "/items/" + (destCount + i)] = item;
  }
  if (!destPallet) {
    updates["tracker/pallets/" + toPid + "/dest"]    = destLabel || fromPallet.dest || "Building 715";
    updates["tracker/pallets/" + toPid + "/created"] = Date.now();
  }

  // Recalculate picks counters for every affected item code from scratch
  // We need to do this AFTER the above changes are applied, so we simulate the new state
  const affectedCodes = [...new Set(moveItems.map(it => it.item))];
  for (const code of affectedCodes) {
    // Build a temporary view of what pallets will look like after the move
    const tempPallets = JSON.parse(JSON.stringify(liveData.pallets));

    // Apply the simulated move to tempPallets
    if (!Object.keys(keepItems).length) delete tempPallets[fromPid];
    else tempPallets[fromPid] = {...tempPallets[fromPid], items: keepItems};

    if (!tempPallets[toPid]) {
      tempPallets[toPid] = { dest: destLabel || fromPallet.dest || "Building 715", items: {} };
    }
    for (let i = 0; i < moveItems.length; i++) {
      const item = {...moveItems[i]};
      if (destCust) item.customer = destCust === "Building 715" ? "715" : destCust;
      tempPallets[toPid].items[destCount + i] = item;
    }

    // Now sum from tempPallets for this code across all customers
    const sums = {}; // customer -> qty
    for (const [, pd] of Object.entries(tempPallets)) {
      for (const it of Object.values(pd.items || {})) {
        if (it.item !== code) continue;
        const cust = it.customer || "715";
        sums[cust] = (sums[cust] || 0) + (it.qty || 1);
      }
    }

    // Get all customers this code has had picks for (old + new)
    const allCusts = new Set([
      ...Object.keys((liveData.picks[code] || {})),
      ...Object.keys(sums)
    ]);

    for (const cust of allCusts) {
      const firebaseKey = cust === "715" ? "_715" : cust;
      const newVal = sums[cust] || sums[firebaseKey] || 0;
      updates["tracker/picks/" + code + "/" + firebaseKey] = newVal;
    }
  }

  const moveBtn = document.getElementById("move-btn");
  if (moveBtn) { moveBtn.disabled = true; moveBtn.textContent = "MOVING..."; }

  try {
    await update(ref(db), updates);
    closeModal();
    const custMsg = destCust ? " → " + destCust : "";
    showToast("✓ Moved " + moveItems.length + " item(s) to " + toPid + custMsg, "var(--green)");
  } catch(e) {
    showToast("Move failed — check connection", "var(--red)");
    if (moveBtn) { moveBtn.disabled = false; moveBtn.textContent = "↗ MOVE CHECKED ITEMS"; }
  }
}

// ── Recalculate ALL picks counters from pallet data ──────────────────────────
// Fixes any stale counts caused by edits, deletes, or data entry errors
async function recalcAllCounts() {
  const btn = document.getElementById("recalc-btn");
  if (btn) { btn.textContent = "⏳ RECALCULATING..."; btn.disabled = true; }

  // Build correct totals by scanning every pallet item
  // Structure: totals[itemCode][customer] = qty
  const totals = {};
  for (const pdata of Object.values(liveData.pallets)) {
    for (const it of Object.values(pdata.items || {})) {
      const code = it.item;
      const cust = it.customer || "715";
      if (!totals[code]) totals[code] = {};
      totals[code][cust] = (totals[code][cust] || 0) + (it.qty || 1);
    }
  }

  // Build Firebase updates — set every picks entry to the recalculated value
  const updates = {};

  // First: zero out all existing picks entries so removed items get cleared
  for (const code in liveData.picks) {
    for (const cust in liveData.picks[code]) {
      const key = cust === "_715" ? "_715" : cust;
      updates["tracker/picks/" + code + "/" + key] = 0;
    }
  }

  // Then: write the correct values from pallet data
  for (const code in totals) {
    for (const cust in totals[code]) {
      const key = (cust === "715" || cust === "Building 715") ? "_715" : cust;
      updates["tracker/picks/" + code + "/" + key] = totals[code][cust];
    }
  }

  try {
    await update(ref(db), updates);
    showToast("✓ All counts recalculated from pallet data", "var(--green)");
  } catch(e) {
    showToast("Recalc failed — check connection", "var(--red)");
  } finally {
    if (btn) { btn.textContent = "🔄 RECALC COUNTS"; btn.disabled = false; }
  }
}

function csvEscape(v) {
  const s = String(v == null ? "" : v);
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function csvRow(arr) { return arr.map(csvEscape).join(",") + "\r\n"; }

function downloadCSV(filename, rows) {
  const csv = rows.map(r => csvRow(r)).join("");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

      const code = it.item.toUpperCase();
      const cust = it.customer || "715";

  // ── 1. Order Status CSV (SJL + Bealls + Key Account) ────────────

    const rem = Math.max(0, row.qty - filled);

  // ── 2. Pallet Summary CSV ────────────────────────────────────────
  setTimeout(() => {

      if (dest.includes("Beall"))    cust = "Beall's";
      else if (dest.includes("SJL")) cust = "SJL";

        custStats[cust].units += (it.qty || 1);
        custStats[cust].skus.add(it.item);
      }
    }
    const totalPallets = Object.values(custStats).reduce((s,v) => s+v.pallets, 0);
    const totalUnits   = Object.values(custStats).reduce((s,v) => s+v.units, 0);
    const s2 = [["Customer","Pallets Built","Total Units","Unique SKUs","% of Total Pallets"]];
    for (const cust of customers) {
      const st = custStats[cust];
      const pct = totalPallets > 0 ? Math.round(st.pallets/totalPallets*100) : 0;
      s2.push([cust, st.pallets, st.units, st.skus.size, pct+"%"]);
    }
    s2.push(["TOTAL", totalPallets, totalUnits, "", "100%"]);
    downloadCSV("BC_Pallet_Summary_" + date + ".csv", s2);
  }, 600);

  // ── 3. Pallets Detail CSV ─────────────────────────────────────────
  setTimeout(() => {
    const s3 = [["Pallet ID","Destination","Item #","Description","Status","Customer","Qty","Worker","Time"]];
    for (const [pid,pd] of Object.entries(liveData.pallets).sort((a,b)=>a[0].localeCompare(b[0]))) {
      for (const it of Object.values(pd.items||{})) {
        s3.push([pid, pd.dest||"", it.item, it.desc||"", getStatus(it.item).full, it.customer||"", it.qty||1,
                 it.worker||"", it.ts ? new Date(it.ts).toLocaleString() : ""]);
      }
    }
    downloadCSV("BC_Pallets_" + date + ".csv", s3);
  }, 1200);

  // ── 4. Activity Log CSV ───────────────────────────────────────────
  setTimeout(() => {
    const s4 = [["Time","Worker","Item #","Description","Customer","Pallet","Qty"]];
    for (const s of [...liveData.log].reverse()) {
      s4.push([new Date(s.ts).toLocaleString(), s.worker, s.item, s.desc||"",
               s.customer||"", s.pallet||"", s.qty||1]);
    }
    downloadCSV("BC_Activity_" + date + ".csv", s4);
    showToast("✓ 4 CSV files downloaded — open in Excel", "var(--green)");
  }, 1800);
}


// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function showToast(msg, color) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = color || "var(--accent)";
  t.style.display = "block";
  clearTimeout(t._tmr);
  t._tmr = setTimeout(() => { t.style.display = "none"; }, 2800);
}

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
boot();
</script>
